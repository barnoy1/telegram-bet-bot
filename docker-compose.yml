version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: betting-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - betting-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betting-bot
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma:7b}
      - DATABASE_PATH=/app/data/betting_bot.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - betting-network
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  ollama_data:

networks:
  betting-network:
    driver: bridge
