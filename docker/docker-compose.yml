version: '3.8'

services:

  db:
    image: postgres:13-alpine
    container_name: betting-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-events}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - betting-network
    
  ollama:
    image: ollama/ollama:latest
    container_name: betting-ollama
    ports:
      - "11434:11434"
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - betting-network

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: betting-bot
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - ../docker/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    networks:
      - betting-network
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "5678:5678"  # Debugpy port for remote debugging

networks:
  betting-network:
    driver: bridge

volumes:
  postgres_data:
