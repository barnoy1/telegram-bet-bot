# Russian translations for Poker Bot - Persona: Sleazy 🃏
meta:
  language_code: "ru"
  language_name: "Russian"
  direction: "ltr"
  encoding: "utf-8"

# UI Messages
start:
  header: "🎰 ПОКЕР БОТ - СТОЛИК СЛЕЙЗИ"
  initialized: "Бот инициализирован. Давайте держать всё чисто, парни."
  description: "Я здесь, чтобы отслеживать ваши ставки и убедиться, что 'чаша' полна."
  quick_start: "Быстрый старт:"
  quick_start_text: "Просто отправьте число, чтобы сделать ставку. Я займусь математикой."
  help_command: "Напишите `/h` для правил дома."

help:
  header: "КОМАНДЫ ДОМА"
  poker_commands: "Команды действий:"
  str_desc: "Открыть новый стол (приведи друзей)"
  out_desc: "Забери выигрыш (или то, что осталось)"
  quick_bet: "Быстрая ставка:"
  quick_bet_text: "Просто отправь число (например, `50`) чтобы подкинуть пластика"
  info_commands: "Команды информации:"
  sts_desc: "Проверь статус стола. Кто выигрывает?"
  l_desc: "Изменить язык бота"
  t_desc: "Транзакции расчета - кто кому должен"
  v_desc: "Версия бота"
  mgmt_commands: "Управление:"
  u_desc: "Отменить последнюю ставку (если руки дрожали)"
  r_desc: "Сбросить всё. Свежий старт."
  h_desc: "Показать это меню помощи"

welcome:
  header: "ДОБРО ПОЖАЛОВАТЬ В ПОДВАЛ"
  joined: "Дом открыт! Покер бот в здании."
  description: "Я буду отслеживать ваши ставки и рассчитывать ущерб в конце ночи."
  to_get_started: "Чтобы начать:"
  str_instruction: "Напишите `/str` чтобы инициализировать стол"
  need_help: "Запутался?"
  help_instruction: "Напишите `/h` в любое время, Чемпион."

status:
  header: "📊 СТАТУС СТОЛА"
  total_pot: "Суп (Общий банк):"
  players: "Активные игроки:"
  no_players: "Стол пуст. Что это, библиотека?"

errors:
  event_not_initialized: "Стол ещё не открыт. Запустите `str` прежде чем начнёте кидать деньги."
  event_closed: "Игра закрыта. Используйте `/str` чтобы начать новую смену."
  amount_positive: "Что за число? Дай мне реальную сумму, не клоунничай."
  event_not_found: "Игра не найдена. Используйте `/str` чтобы заставить карты двигаться."
  cannot_bet_state: "Нельзя сделать ставку в состоянии {state}."

# Behavioral Playbook - Fresh Meat (New Player Joins)
fresh_meat:
  greetings:
    - "Новая кровь! Садись на ящик, парень. Только не роняй слёзы на сукно, я его только что пылесосил."
    - "Ого! Посмотри на этого филантропа! Садись, Большой Шот — устраивайся поудобнее. Я прослежу, чтобы парни относились к твоим фишкам с 'уважением' прежде чем заберут их."
    - "Ну что, новый донор для Пенсионного Фонда Слейзи. Садись, посмотрим, из чего ты сделан."
    - "Свежее мясо в мясорубке! Занимай место, не обращай внимания на запах — это просто запах упущенных возможностей."
    - "Посмотри на эти часы! Они настоящие или ты нашёл их в коробке с хлопьями? В любом случае, твои деньги здесь хороши."
    - "Добро пожаловать в большую лигу, Руки. Постарайся не опозориться в первые десять минут."
    - "Новый игрок! Несите ему напиток — он понадобится, когда он увидит, как кусаются эти акулы."
  big_buyin: "Святые смокинг! Посмотри на банкролл у этого. Садись, Чемпион. Я люблю парней, которые не боятся проигрывать со стилем."

# Behavioral Playbook - The Action (Placing a Bet)
action:
  standard_bet: 
    - "О, он чувствует перчинку! Кидает пластик в центр. Ты пытаешься купить подсказку или просто хвастаешься?"
    - "Интересный ход. Ты гонишься за мечтой или просто устал от полного кошелька?"
    - "Вкладываешь кожу в игру, да? Мне нравится уверенность, посмотрим, согласятся ли карты."
    - "Там уходят деньги на обед. Ты уверен в этом, Эйнштейн? Банк становится голодным."
    - "Кидаем немного пластика? Ты пытаешься впечатлить стол или у тебя просто дёргается палец?"
    - "Хорошая ставка, Гений. Посмотрим, говорят ли твои карты так же громко, как твои фишки."
    - "Суп начинает выглядеть вкусно. Продолжай, у меня платеж за лодку."
  big_bet: 
    - "Вот оно! 'Геройский ход'. Ты ставишь так, будто у тебя в подвале принтер, Чемпион. Уверен, что твоё сердце выдержит такой стресс?"
    - "Ого, Большой Трата! Кто-то хочет закончить ночь пораньше или ты просто ненавидишь иметь деньги?"
    - "Посмотри на себя! Веди себя так, будто мы в Вегасе. Это подвал, приятель. Держи ноги на земле."
    - "Бросил бомбу на стол! Посмотрим, кто останется стоять, когда пыль уляжется."
    - "Это 'олл-ин' на твою гордость. Надеюсь, у тебя есть козыри, чтобы это подтвердить."
    - "Кто-то чувствует себя очень смелым. Или очень отчаявшимся. Мы скоро узнаем, не так ли?"
    - "Это много пластика для парня в поддельном костюме. Чувствуешь себя счастливым сегодня вечером?"
  hesitation: 
    - "Тик-так, Эйнштейн. Лёд в моём напитке тает быстрее, чем твоя решимость. Ты в игре или снова складываешь гордость?"
    - "Давай, парень. Стол ждёт, а моё терпение стоит дополнительно. Сделай ход."
    - "Ты рассчитываешь орбитальную скорость луны или просто боишься? Толкай фишки."
    - "Тишина меня убивает. Сделай что-нибудь или уступи место кому-то с пульсом."
    - "Пересчитываешь? Это покер, не GPS. Жми на газ или съезжай."
    - "Время — деньги, и ты тратишь и то, и другое. Что будет?"
    - "Ты ждёшь письменного приглашения? Толкай пластик или складывай тихо."

# Behavioral Playbook - The Rebuy
rebuy:
  enabler: 
    - "Вот это дух! Я знал, что ты не сдавшийся. Вторая ипотека всегда самая удачная, правда?"
    - "Вернулся за большим? Я люблю настойчивость. Большинство парней бы назвали это ночью, но ты? У тебя есть 'видение'."
    - "Вот что я называю решимостью. Или безумием. Пока не уверен, но банк точно счастлив."
    - "Третий раз удачный! Или в твоём случае, третий раз, когда ты финансируешь мой отпуск на побережье. Садись обратно."
    - "Мне нравится твой стиль. Эта стопка выглядит удачнее предыдущей, я чувствую это."
    - "Не останавливайся сейчас! Ты прямо посередине учебного опыта. Долей пластик."
    - "Вот наш профи! Я знал, что ты вернёшься. Стол скучал без твоего вклада."
  mockery: 
    - "Ещё одна стопка для стола! Спасибо, мне действительно нужно было отремонтировать кухню. Посмотрим, эти фишки умнее предыдущих."
    - "Тебе не надоедает проигрывать? Шучу! Продолжай течь деньги, дом любит тебя."
    - "Копаешь глубже в карманы, да? Я люблю игроков с глубокими карманами и короткой памятью."
    - "Посмотри на эту настойчивость! Если бы ты так же усердно работал на основной работе, ты бы уже был CEO."
    - "Снова в ринге? Я восхищаюсь твоей способностью игнорировать реальность. Перемешай их."
    - "Деньги всё равно жгли дыру в твоём кармане. Я помогу тебе потушить пожар."
    - "Ты действительно думаешь, что эта партия другая? Ну, я не здесь, чтобы судить, я здесь, чтобы грабить."

# Behavioral Playbook - Exit Interview
exit:
  winner_leaving: 
    - "Уже уходишь? Солнце ещё не взошло! Забираешь деньги семьи и убегаешь? Настолько классно, Эйнштейн. Настолько классно."
    - "Забираешь прибыль с собой? Умный ход. Жаль, я только начал любить твои деньги."
    - "Идёшь домой? Не забудь всем рассказать, какой Слейзи был милым, пока он считал твои фишки."
    - "Налёт и побег! Оставайся классным, Чемпион. Уверен, колесо вернётся к тебе завтра."
    - "Куда ты? Стол только разогревается! Купи жене что-нибудь приятное, может, она позволит тебе вернуться."
    - "Железная дисциплина, да? Я ненавижу это, но уважаю это. А теперь выметайся."
    - "Забираешь сливки и уходишь? Ладно, Гений. Оставь чаевые для грабля на выходе."
  loser_leaving: 
    - "Выбился, да? Не смотри на меня — я просто парень с граблей. Не волнуйся, мы назовём стул в честь твоего вклада сегодня."
    - "Что случилось? Жена позвонила? Или у тебя просто закончились кишки посреди руки?"
    - "Ну, у каждой вечеринки есть конец. Постарайся не удариться о дверь на выходе, зрение немного размыто от проигрыша."
    - "Стол будет чувствовать себя пустым без тебя... и твоего кошелька. Возвращайся, когда у тебя будет мясо на костях."
    - "Шарик лопнул? Не волнуйся, всегда можно продать почку и вернуться завтра. Шучу... в основном."
    - "Ушёл с вывернутыми карманами? Не волнуйся, тёплая ночь. Возвращайся, когда будет свежий банкролл."
    - "Жёсткий перелом. Эта игра — жестокая госпожа. Иди поспи и мечтай о стрит-флеше."

# Exit Taunts - Positive Balance (Profit)
exit_taunts:
  positive:
    fake_friendly:
      - "Эй, эй! {username} уходит с прибылью ${balance:.2f}? Умный бизнес, Чемпион! Мы все друзья здесь... некоторые просто богаче друзья!"
      - "Дыши, {username}! Ты в плюсе ${balance:.2f} и зовёшь это днём? Я уважаю дисциплину, Гений. Правда!"
      - "Посмотри на себя, {username}! ${balance:.2f} в чёрном! Вот что я называю игрой в безопасности. Дом любит предсказуемого игрока!"
      - "Хорошо сделано, {username}! ${balance:.2f} в кармане. Вот так строится империя, медленно и осторожно."
      - "{username}, ты убиваешь! Забрал ${balance:.2f} и сиганул. Люблю холодный ход."
      - "Ты сделал это, Король. Прибыль ${balance:.2f} — это не шутка. Иди праздновать, ты это заслужил."
      - "Вижу, кто знает, когда резать и бежать. ${balance:.2f} — отличный выход. Увидимся в кругу победителей."
    aggressive:
      - "Что это, {username}? Забираешь ${balance:.2f} и убегаешь? Сделай ход, прежде чем я начну брать аренду поминутно!"
      - "{username} выхватывает ${balance:.2f} из супа и убегает! Пусть кто-то сделает РЕАЛЬНЫЙ ход или выметай!"
      - "Убегаешь с прибылью ${balance:.2f}, {username}? Это не покер, это налёт и побег! Где кишки?"
      - "Выхватил ${balance:.2f} и улетел? В чём дело, боишься, что удача повернётся? Трусы не строят памятники."
      - "{username}, ты серьёзно? С ${balance:.2f} ты закрываешь лавку? Я думал, ты пришёл играть."
      - "Взял 'подливку' и убежал. Хорошо, Эйнштейн. Не забывай оглядываться через плечо."
      - "Что это, {username}? Заработал ${balance:.2f} и вдруг торопишься? Останься и дай парням шанс вернуть это."
    superstitious:
      - "{username} уходит с ${balance:.2f}? Ты сидишь на счастливом стуле, приятель. Не порти вайб ранним уходом!"
      - "Перестань так громко дышать, {username}! Ты забиваешь удачу своим уходом с ${balance:.2f}! Стол теперь проклят!"
      - "{username} забирает ${balance:.2f} и убегает? Плохая карма, приятель. Ты нарушил поток! Вселенная помнит!"
      - "{username}, уходишь с ${balance:.2f}? Духи стола не любят, когда ты уходишь посреди серии."
      - "Стул {username} всё ещё тёплый от удачи, а он убегает с ${balance:.2f}. Это вернётся, чтобы преследовать тебя."
      - "Ты нарушил ритм, {username}. Забрал ${balance:.2f} и испортил энергию для всех. Не круто."
      - "Удача любит настойчивых, а ты убегаешь с ${balance:.2f}? Стол этого не забудет."

  # Exit Taunts - Negative Balance (Loss)
  negative:
    fake_friendly:
      - "Эй, {username}! Минус ${abs_balance:.2f}? Это просто бумага, Киллер! Мы все друзья здесь... дом иногда выигрывает!"
      - "Дыши, {username}! Ты стал легче на ${abs_balance:.2f}, но мудрее, правда? Пластик всегда ждёт твоего возвращения!"
      - "Посмотри на это, {username}! ${abs_balance:.2f} в красном! Считай это инвестицией в своё покерное образование, Гений!"
      - "Ничего страшного, {username}. ${abs_balance:.2f} — это просто число. Завтра новый день и карты перевернутся."
      - "Случается с лучшими из нас, {username}. ${abs_balance:.2f} меньше в кошельке, но больше опыта в голове. Правильно?"
      - "Не принимай близко к сердцу, {username}. ${abs_balance:.2f} — это небольшая цена за веселье."
      - "Легко пришло, легко ушло, {username}. ${abs_balance:.2f} — мелочь по сравнению с тем, что ты выиграешь в следующий раз."
    aggressive:
      - "Что это, {username}? Минус ${abs_balance:.2f} и убегаешь? Это вязальный кружок или покерный стол?"
      - "{username} кровоточит ${abs_balance:.2f} и убегает? Блюдо для сбора было голодно сегодня! Не возвращайся без денег!"
      - "Складываешь с дефицитом ${abs_balance:.2f}, {username}? Дом всегда выигрывает, Гений! Всегда! Где твоя гордость?"
      - "Сломался слишком рано, {username}. ${abs_balance:.2f} было всё, что нужно, чтобы вывести тебя из игры?"
      - "{username}, ты убегаешь как ребёнок, потерявший деньги на обед. Урон ${abs_balance:.2f} и у тебя нет воздуха?"
      - "Проиграл ${abs_balance:.2f} и срезался? Ты должен был остаться и драться. Трусы не выигрывают."
      - "Посмотри на {username}, оставляет ${abs_balance:.2f} в банке и убегает с поджатым хвостом."
    superstitious:
      - "{username} минус ${abs_balance:.2f}? Ты дышал на карты! Плохая энергия, приятель!"
      - "Стул был неудачным для тебя, {username}. ${abs_balance:.2f} исчезли, потому что ты испортил фэн-шуй!"
      - "{username} уходит беднее на ${abs_balance:.2f}? Ты нарушил мо-джо! Столу нужна была свежая энергия в любом случае!"
      - "{username}, ты оставил здесь ${abs_balance:.2f} и забрал всю неудачу с собой. Спасибо, я полагаю."
      - "Духи не чувствовали {username} сегодня вечером. ${abs_balance:.2f} исчезли из-за сглаза, точно."
      - "Кто-то наложил проклятие на тебя, {username}. ${abs_balance:.2f} исчезли, как будто их никогда не было. Иди к священнику."
      - "Этот стол был проклят для тебя, {username}. ${abs_balance:.2f} — это цена, которую ты заплатил, чтобы снять проклятие."

  # Exit Taunts - Break Even
  break_even:
    fake_friendly:
      - "Эй, {username}! Выйти в ноль с ${prize_amount:.2f}? Вот что я называю спокойной ночью! Без драмы, просто друзья!"
      - "Дыши, {username}! ${prize_amount:.2f} точно? Это по сути победа в моей книге, Киллер! В безопасности и звуке!"
      - "Посмотри на это, {username}! Идеальный выход в ноль! Дом уважает дисциплинированного игрока, Гений! Уважение!"
      - "Выбрался безопасно, {username}. ${prize_amount:.2f} — это точно то, с чем ты пришёл. Не проигрывать — это победа."
      - "Весёлый вечер и закончил с ${prize_amount:.2f}? Отличный выход, {username}. Увидимся в следующий раз."
      - "Прояснил голову и вернулся с ${prize_amount:.2f}. Умно и ровно, именно так я люблю."
      - "Статус-кво, {username}. ${prize_amount:.2f} и домой. Иногда не проигрывать — это самая большая победа."
    aggressive:
      - "Что это, {username}? Выйти в ноль с ${prize_amount:.2f}? Это покерная игра или вязальный кружок? Где действие?"
      - "{username} играет в безопасность с ${prize_amount:.2f}? Я здесь засыпаю! Сделай РЕАЛЬНЫЙ ход или иди домой!"
      - "Точно ${prize_amount:.2f}, {username}? Скучно! Где азарт, Чемпион? Ты пришёл играть или что?"
      - "Ничья на ${prize_amount:.2f}? Это как целовать сестру, {username}. Где возбуждение?"
      - "{username}, ты ванильный. ${prize_amount:.2f} и выход? Мы не открывали стол ради этого."
      - "Играл часами только чтобы вернуться с ${prize_amount:.2f}? Трата электричества, честно говоря."
      - "{username}, ты самый скучный игрок, которого у нас был. ${prize_amount:.2f} и всё? Иди домой."
    superstitious:
      - "{username} выходит в ноль? Ты нейтрализуешь космический баланс! Вселенная ненавидит безразличие!"
      - "${prize_amount:.2f} точно, {username}? Ты не приверженец удачи ИЛИ неудачи! Духи в замешательстве!"
      - "Выход в ноль, {username}? Стол не знает, праздновать или плакать! Выбери сторону, приятель!"
      - "Ты застрял посередине, {username}. ${prize_amount:.2f} — это состояние нулевой энергии. Стол это ненавидит."
      - "Духи здесь сбиты с толку тобой, {username}. ${prize_amount:.2f} — это ни мясо, ни молоко. Принеси эмоции."
      - "{username}, ты сломал колесо. ${prize_amount:.2f} — это как остановка времени. Это укусит тебя однажды."
      - "Идеальный баланс ${prize_amount:.2f}. Это подозрительно, {username}. Ты не выравниваешься с космосом."

# Volatility Protocol - Moods
volatility:
