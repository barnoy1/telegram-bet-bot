# ============================================================
# Behavioral Playbook - Fresh Meat (New Player Joins)
# ============================================================
fresh_meat:
  greeting:
    - "אוי, מי בא! תגרור כיסא, חביבי. רק תנסה לא לבכות על השטיח — שילמתי מלא כסף על הניקיון."
    - "הנה דם טרי! ברוך הבא, נשמה. הכסף שלך יחוש בנוח פה — לפחות בינתיים."
    - "מי זה? שחקן חדש?! תשב תשב, אל תהיה ביישן. אנחנו לא נושכים. בגדול."
    - "אה, תראו מי הגיע! תמיד שמח לראות פנים חדשות בשולחן. בפרט פנים שעוד לא למדו להיזהר ממני."
    - "הו הו! ניחוח של מתחיל! בוא תשב, חמוד. כולם פה היו פעם טריים כמוך. רובם עדיין בוכים על זה."
    - "יאללה, כנס! אל תסתכל ככה על כולם — הם לא מסוכנים. השולחן כן, אבל הם לא."
    - "חדש?! מעולה. אני אוהב חדשים. הם תמיד כל כך... אופטימיים."
    - "ברוך הבא לגן עדן, ילד. לפחות ככה זה נראה בהתחלה."
  big_buyin:
    - "וואלה! תראו את הנדבן הזה! בוא תשב נוח, גבר — תרגיש בבית. אני אדאג שהחבר'ה יתייחסו לכסף שלך ב'כבוד' לפני שהם גומרים אותו."
    - "אבל אבל אבל! כניסה של מלך! תשב, אדוני. השולחן כבר שמע שבאת — הוא מתרגש."
    - "מישהו הביא תקציב! לא, באמת — כבוד. אנחנו פה נטפל בזה בזהירות הראויה."
    - "וואו, תראו את הכניסה! אחי, אתה מגיע ככה?! הבית אוהב אותך. מאוד מאוד אוהב."
    - "הה! מישהו יצא מהבנק היום בטוב. תשב, גדול. הצ'יפס כבר מחכים לך — כמו תמיד."
    - "זהו! ראיתם? הנה מה שנקרא שחקן אמיתי. או לפחות שחקן עם ארנק אמיתי. זה מספיק לי."
    - "תכבד את עצמך, אח! כניסה כזאת מחייבת הצגה. כולם — תכירו את האיש שישלם לנו את הערב!"


# ============================================================
# Behavioral Playbook - The Action (Placing a Bet)
# ============================================================
action:
  standard_bet:
    - "הו, התעורר! דוחף פלסטיק לאמצע כמו שהוא יודע משהו. אתה קונה ביטחון עצמי או סתם מבזבז?"
    - "הנה זה! קצת תנועה סוף סוף. רק תדע שהקופה לא מרשימה כמו הפנים שעשית."
    - "יאללה, נע! הוא מהמר. לא הרבה, לא מעט — בדיוק כמו שמהמר מישהו שלא בטוח בעצמו."
    - "אחי, אתה מהמר או מדמה שאתה מהמר? כי ביניהם יש הבדל של כמה שקלים."
    - "זז! טוב. לפחות מישהו פה עושה משהו. השאר — אתם בחופשה?"
    - "הנה תנועה! הוא שם כסף! לא הרבה, אבל זה התחלה. בוא נראה אם ממשיך."
    - "אוקיי אוקיי, נשים את זה בקופה. כסף נכנס, כסף יוצא — בדרך כלל יוצא לכיוון שלי."
    - "הוא מהמר! רשמו את התאריך. הבן אדם קיבל החלטה."
  big_bet:
    - "נה נה נה! יאללה, גיבור! אתה מהמר כאילו הדפסת את הכסף בבית. בטוח הלב שלך יחזיק, מפגן?"
    - "אוי ואבוי! מה זה?! הוא כל אחד?! שמישהו יחזיק לי את המשקה, אני צריך שתי ידיים לספור."
    - "תאמין לי, ראיתי פחות דרמה בסרטי אקשן. אחי, הכסף בטוח?"
    - "הופ הופ הופ! מישהו קיבל SMS מהבנק ולא ענה. בוא נראה איך נגמר הסיפור הזה."
    - "זה... זה הרציני? לא, תגיד לי שזה הרציני. כי אם כן — ניצחת אותי. בגדול. לפחות בעזות פנים."
    - "הוא שם את זה כולו! בום! אדוני הגיבור של הערב. או הקורבן — עוד לא ברור."
    - "יאאאלה! ביצות מברזל על האיש הזה! לא יודע מה יש לו בקלפים אבל בשקלים — הוא עשיר בטוח."
    - "תעצרו הכל! מישהו פה מהמר כמו שיש לו עוד בבית. שתיקה, כבוד."
  hesitation:
    - "יאללה כבר, פרופסור. הקרח במשקה שלי נמס מהר יותר ממך. אתה משחק או מחכה לניס?"
    - "אחי, הכסף לא הולך לשום מקום. אבל הסבלנות שלי כן. תזוז."
    - "מה יש, חישובים? פה לא אוניברסיטה. יאללה, תחזיר."
    - "אנחנו ממתינים... ועוד ממתינים... מישהו רוצה קפה בינתיים? כי ברור שיש זמן."
    - "תראה אותו — הוא חושב! ניס. בינתיים כולם כאן כבר הזדקנו שנה."
    - "תחליט כבר, חמוד. אתה לא בבוחן — אין תשובה נכונה. יש רק כסף שנכנס או לא."
    - "אני לא לוחץ, אני ממש לא לוחץ... אבל אם לא תזוז בחמש שניות אני מתחיל לשיר."
    - "טוב, יש לנו כל הלילה. אבל השולחן יש לו אגרה לפי שעה. שיידע."


# ============================================================
# Behavioral Playbook - The Rebuy
# ============================================================
rebuy:
  enabler:
    - "כן כן! ידעתי שלא תיכנע. המשכנתה השנייה — זו תמיד המזל, לא?"
    - "הנה מי שחזר! ידעתי שאין לך כוח לעזוב. הכסף הזה מחכה לך — ממש כאן בכיס שלי."
    - "עוד סיבוב? ברוך הבא בחזרה, חביבי. הכיסא שלך עוד חם."
    - "אהה! הלב הגדול חוזר! ידעתי. בן אדם עם אש בבטן לא נכנע כל כך מהר."
    - "שוב? נהדר. אני אוהב אנשים עם התמדה. ותקציב גמיש."
    - "הנה הוא! אמרתי לעצמי — הוא יחזור. יש בו משהו. לא יודע בדיוק מה, אבל זה עולה כסף."
    - "מעולה, עוד צ'יפס! תדע שבכל פעם שאתה קונה עוד, מתחמם לי הלב. ממש."
  mockery:
    - "חזרת? אני מעריץ את העקשנות. רוב האנשים היו כבר בבית עם אשתם, אבל אתה? יש לך 'חזון'. יאללה, בוא נראה אם הצ'יפס החדש חכם יותר מהישן."
    - "אוהו! ה'פניקס' עלה מהאפר. טוב, תשב — הכסף החדש בטח ילמד מטעויות הכסף הישן. בטח."
    - "שוב?! תגיד לי — יש אישה בבית? ילדים? לא? אוקיי, שיהיה. תיכנס."
    - "מה אמרתי — אי אפשר לעצור אותך! גם אחרי שהשולחן גמר אותך, חזרת. זה נקרא תעוזה. או עקשנות. אתה תחליט."
    - "שנית?! אחי, הכסף הזה כבר ידע שהוא מגיע לפה — שלחת אותו קצת מוקדם."
    - "אוי, הוא חזר! חיכיתי לך. לא בגלל שהתגעגעתי — בגלל שידעתי שאין לך ברירה."
    - "עוד כסף טרי! תמיד שמח לראות אדם שלא מוותר על החלומות שלו. גם כשהחלומות יקרים מאוד."
    - "הנה הגל השני! חבר, אתה מדהים אותי. כל פעם שאני חושב שגמרנו — אתה חוזר עם עוד."


# ============================================================
# Behavioral Playbook - Exit Interview
# ============================================================
exit:
  winner_leaving:
    - "כבר הולך?! השמש עוד לא זרחה! לוקח את הכסף של כולם ונעלם? יופי אופי, איינשטיין. ממש יופי אופי."
    - "מה זה, הצגה אחת ובאי? לוקח את הקופה ועושה פנה? לפחות תגיד להם אמריקן גודבאי."
    - "הולך?! עם הכסף שלנו?! בסדר, בסדר — לא שיש לי מה לומר. בחוקי לגמרי. לגמרי."
    - "תראו אותו — מנצח ועוזב! ממש כמו בסרטים. כל הכבוד, חמוד. כל הכבוד שאפשר לתת לאדם שעוזב חברים."
    - "מחכה עד שהוא מנצח ואז בורח — זו האסטרטגיה?! לפחות תישאר ותיתן לנו להחזיר קצת!"
    - "יאללה חזק! הולך עם מלא כסף, הולך בריא. אנחנו נהיה בסדר. בטח. ממש."
    - "חבר, אם אתה עוזב עכשיו אתה שובר לב. לא שלי — של הקופה."
    - "בסדר בסדר! לך לך. אבל בפעם הבאה שאתה מפסיד — אל תזכיר לי שפעם ניצחת."
  loser_leaving:
    - "נגמר הבנזין? אל תסתכל עליי — אני רק גובה את הגרגר. לא נורא, נקרא כיסא על שמך. תרומה מכובדת."
    - "הולך? בסדר גמור. תביא בברכה בפעם הבאה — שולחן תמיד פתוח לתורמים."
    - "יאללה, לך לנוח. הכסף ימצא את הדרך בלעדיך. הוא כבר מצא, בעצם."
    - "תסתכל — הוא הפסיד הכל ועדיין עומד זקוף. זה נקרא כבוד עצמי. נדיר. ממש נדיר."
    - "מה, כבר?! לא רצית לנסות עוד קצת? לא, בסדר. כסף זה רק כסף. יש עוד."
    - "לך לישון, חמוד. אולי בחלומות תנצח. פה — פחות."
    - "תנוח תנוח. הכיסא שלך כבר ממתין למחזיק הבא. השולחן לא מחכה לאף אחד."
    - "שמור על עצמך, גיבור. ותזכור — הבית לא אישי. הבית רק רוצה את הכסף שלך."


# ============================================================
# Exit Taunts - Positive Balance (Profit)
# ============================================================
exit_taunts:
  positive:
    fake_friendly:
      - "היי היי! {username} הולך עם ${balance:.2f} ברווח? עסקים טובים, אחי! אנחנו כולם חברים פה... חלק פשוט חברים יותר עשירים!"
      - "תנשום, {username}! עלית ${balance:.2f} וקופץ כבר? כבוד על המשמעת, גאון. באמת, כבוד."
      - "תראה אותו, {username}! ${balance:.2f} בפלוס! כזה שיודע מתי להפסיק. הבית אוהב אנשים כאלה — הם לא מפחידים אותו."
      - "מה יפה, {username}! יצאת עם ${balance:.2f} ביד. לא כולם יודעים מתי לצאת. אתה יודע. טוב לך."
      - "כל הכבוד, {username}. ${balance:.2f} רווח — לקחת את מה שמגיע לך ועזבת. אדם חכם. כנראה."
      - "שמח בשבילך ממש, {username}! ${balance:.2f} בכיס — לך תשכוב טוב. מגיע לך."
      - "בסדר, {username}, בסדר! ${balance:.2f} מעל מה שהבאת. זה כבר לא גרוע, נכון? לא גרוע בכלל."
    aggressive:
      - "מה פתאום, {username}? ${balance:.2f} ובורח?! תזוז משהו לפני שאני מתחיל לגבות שכירות על הכיסא!"
      - "{username} חוטף ${balance:.2f} מהקדירה ומתחמק! מישהו פה בכלל בא לשחק?!"
      - "בורח עם ${balance:.2f}, {username}? זה לא פוקר, זה שוד ועריקה. איפה השכל שבך?"
      - "מה זה, {username}? ניצחת ${balance:.2f} ואתה בורח?! מישהו כאן בכלל בא לשחק?!"
      - "רגע רגע רגע! {username} עם ${balance:.2f} ועוזב?! זה שולחן פוקר, לא כספומט!"
      - "אחי, {username}! ${balance:.2f} ביד ואתה מתחמק?! השאר מה — דקורציה?!"
      - "תחכה! {username} לא יוצא עם ${balance:.2f} ומשאיר אותנו ככה. יש גבול לחוצפה, לא?!"
    superstitious:
      - "{username} עוזב עם ${balance:.2f}? אתה יושב על הכיסא המנצח, אחי. לא תשבור את הוייב עכשיו, לא?!"
      - "תפסיק לנשום ככה, {username}! אתה חונק את המזל עם ה-${balance:.2f} שלך! עכשיו כולם יסבלו!"
      - "{username} לוקח ${balance:.2f} ועף? ג'וג'ו רע, חבר. הרסת את הזרימה. היקום רושם."
      - "אל תעזוב, {username}! ${balance:.2f} זה סימן שהמזל כאן עכשיו — אם תלך תקח אותו איתך!"
      - "{username} ברח עם ${balance:.2f} — הרוחות לא אוהבות את זה. כולם יישאו את התוצאות."
      - "הכיסא שלך עוד חם, {username}! ${balance:.2f} זה רק ההתחלה — המזל הגדול עוד מגיע. כנראה."
      - "שמעת, {username}? ${balance:.2f} עכשיו — אבל השולחן הזה נותן ונוקם. הכוכבים לא שכחו."


  # Exit Taunts - Negative Balance (Loss)
  negative:
    fake_friendly:
      - "היי, {username}! ירדת ${abs_balance:.2f}? זה רק נייר, אח שלי! אנחנו חברים — לפעמים הבית זוכה, מה לעשות."
      - "יהיה בסדר, {username}! ${abs_balance:.2f} פחות אבל הרבה יותר חכם, לא? הצ'יפס תמיד מחכה לך."
      - "תראה, {username}! ${abs_balance:.2f} באדום — קרא לזה שכר לימוד. כרטיס ההשכלה הכי יקר בשכונה!"
      - "חבר'מן, {username}! ${abs_balance:.2f} ירדו — זה קורה לכולם. ממש לכולם. כולל לאנשים חכמים ממך."
      - "אל תיקח ללב, {username}. ${abs_balance:.2f} זה כסף — חוזר. בדרך כלל. נפסידי?"
      - "בסדר, {username}, בסדר! ${abs_balance:.2f} זה לא סוף העולם. זה רק סוף הערב."
      - "תנשום, {username}! ${abs_balance:.2f} ירדו, נכון — אבל יצאת עם הבריאות. שזה, לכאורה, יותר חשוב."
    aggressive:
      - "מה זה, {username}? ירדת ${abs_balance:.2f} וקופץ? פה שולחן פוקר או חוג מקרמה?"
      - "{username} משאיר ${abs_balance:.2f} על השולחן ובורח! הקופה תודה לך. בכנות."
