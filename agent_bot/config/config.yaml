# Bot configuration
version: 1.4.1

bot:
  personality:
    enabled: true
    sassy_level: high  # low, medium, high
    use_llm: true  # Use LLM for generating persona responses instead of phrase library
    bit_pot_percent: 0.8  # 80% of pot
    llm_model: gemma4:latest  # Ollama model to use (e.g., gemma4:latest, phi3:latest for faster responses)
    llm_timeout_seconds: 60  # Timeout in seconds before canceling LLM response and using fallback
    llm_temperature: 0.8  # LLM temperature (0.0-1.0, higher = more creative)
    llm_top_p: 0.95  # LLM top_p (0.0-1.0, higher = more diverse)
    llm_num_predict: 80  # LLM max tokens to generate
    llm_num_ctx: 2048  # LLM context window size
  
  inactivity:
    enabled: true
    timeout_minutes: 30  # Time before nasty remark
    random_message_interval_minutes: 90  # Send random message every X minutes
    max_random_messages: 3  # Send N random messages before nasty remark
